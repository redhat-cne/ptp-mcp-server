# PTP MCP Server Deployment
# Deploys the PTP MCP Server for OpenShift Lightspeed integration
#
# Authentication:
# - By default, uses the ServiceAccount token automatically mounted by Kubernetes
# - The 'oc' CLI will use in-cluster authentication via the mounted token
# - For external cluster access, see the commented kubeconfig Secret mount below
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ptp-mcp-server
  namespace: openshift-ptp
  labels:
    app: ptp-mcp-server
    app.kubernetes.io/name: ptp-mcp-server
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ptp-mcp-server
  template:
    metadata:
      labels:
        app: ptp-mcp-server
        app.kubernetes.io/name: ptp-mcp-server
    spec:
      serviceAccountName: ptp-mcp-server
      # Ensure ServiceAccount token is mounted (default behavior, but explicit)
      automountServiceAccountToken: true
      containers:
      - name: ptp-mcp-server
        image: quay.io/redhat-cne/ptp-mcp-server:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: PTP_MCP_PORT
          value: "8080"
        - name: PTP_MCP_HOST
          value: "0.0.0.0"
        - name: PTP_NAMESPACE
          value: "openshift-ptp"
        - name: PTP_DAEMON_NAME
          value: "linuxptp-daemon"
        - name: PTP_CONTAINER_NAME
          value: "linuxptp-daemon-container"
        # Uncomment to use an external kubeconfig instead of in-cluster auth
        # - name: KUBECONFIG
        #   value: "/etc/kubeconfig/config"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        # Uncomment to mount an external kubeconfig
        # volumeMounts:
        # - name: kubeconfig
        #   mountPath: /etc/kubeconfig
        #   readOnly: true
      # Uncomment to use an external kubeconfig Secret
      # volumes:
      # - name: kubeconfig
      #   secret:
      #     secretName: ptp-mcp-kubeconfig
---
# Optional: Secret for external kubeconfig
# Use this if you need to connect to a different cluster than the one the pod is running on
# Create with: oc create secret generic ptp-mcp-kubeconfig --from-file=config=/path/to/kubeconfig
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: ptp-mcp-kubeconfig
#   namespace: openshift-ptp
# type: Opaque
# data:
#   config: <base64-encoded-kubeconfig>
